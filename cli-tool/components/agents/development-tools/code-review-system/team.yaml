# Code Review Team Configuration
# This defines an autonomous team of specialized review agents

team:
  name: code-review-team
  version: 1.0.0
  description: Autonomous team for comprehensive code review and quality assurance
  
orchestrator:
  agent: review-planner
  role: Coordinates review workflow, delegates tasks, aggregates findings
  
agents:
  # Core Reviewers (Priority 1)
  - id: code-reviewer
    role: Reviews code quality, logic, and best practices
    priority: 1
    dependencies: []
    
  - id: architecture-reviewer
    role: Evaluates system design, patterns, and structure
    priority: 1
    dependencies: []
    
  # Security & Safety (Priority 2)
  - id: security-reviewer
    role: Identifies security vulnerabilities and risks
    priority: 2
    dependencies: [code-reviewer]
    
  - id: memory-safety-reviewer
    role: Detects memory leaks, buffer overflows, and unsafe operations
    priority: 2
    dependencies: [code-reviewer]
    
  - id: dependency-reviewer
    role: Reviews dependencies, supply chain security, and licenses
    priority: 2
    dependencies: []
    
  # Performance & Async (Priority 2)
  - id: performance-reviewer
    role: Analyzes performance bottlenecks and optimizations
    priority: 2
    dependencies: [code-reviewer]
    
  - id: async-reviewer
    role: Reviews async patterns, race conditions, and concurrency
    priority: 2
    dependencies: [code-reviewer]
    
  # API & Database (Priority 2)
  - id: api-contract-reviewer
    role: Detects breaking API changes and contract violations
    priority: 2
    dependencies: [architecture-reviewer]
    
  - id: database-reviewer
    role: Reviews SQL queries, schema design, and data integrity
    priority: 2
    dependencies: [code-reviewer]
    
  # Platform-Specific (Priority 3)
  - id: frontend-reviewer
    role: Reviews React/Vue/Angular patterns and UI code
    priority: 3
    dependencies: [code-reviewer]
    
  - id: backend-reviewer
    role: Reviews server-side code, APIs, and middleware
    priority: 3
    dependencies: [code-reviewer]
    
  - id: mobile-reviewer
    role: Reviews iOS/Android/React Native/Flutter code
    priority: 3
    dependencies: [code-reviewer]
    
  - id: devops-reviewer
    role: Reviews Docker, Kubernetes, CI/CD, and infrastructure
    priority: 3
    dependencies: []
    
  # Quality & Standards (Priority 3)
  - id: style-reviewer
    role: Ensures code style consistency and readability
    priority: 3
    dependencies: [code-reviewer]
    
  - id: test-reviewer
    role: Validates test coverage and quality
    priority: 3
    dependencies: [code-reviewer]
    
  - id: accessibility-reviewer
    role: Reviews WCAG compliance and inclusive design
    priority: 3
    dependencies: [frontend-reviewer]
    
  - id: mockdata-reviewer
    role: Reviews mock data quality and realism
    priority: 3
    dependencies: [code-reviewer]

workflow:
  mode: hybrid  # sequential, parallel, or hybrid
  
  phases:
    - name: initial-analysis
      type: parallel
      agents: [code-reviewer, architecture-reviewer, dependency-reviewer, devops-reviewer]
      
    - name: security-analysis
      type: parallel
      agents: [security-reviewer, memory-safety-reviewer]
      wait_for: initial-analysis
      
    - name: specialized-review
      type: parallel
      agents: [performance-reviewer, async-reviewer, database-reviewer, api-contract-reviewer]
      wait_for: security-analysis
      
    - name: platform-review
      type: parallel
      agents: [frontend-reviewer, backend-reviewer, mobile-reviewer]
      wait_for: specialized-review
      
    - name: quality-polish
      type: parallel
      agents: [style-reviewer, test-reviewer, accessibility-reviewer, mockdata-reviewer]
      wait_for: platform-review
      
    - name: synthesis
      type: sequential
      agents: [review-planner]
      wait_for: quality-polish

# Performance Optimizations
optimization:
  # Incremental analysis - only review changed files
  incremental:
    enabled: true
    only_changed_files: true
    context_lines: 5  # Include 5 lines around changes
  
  # Caching - skip unchanged code
  caching:
    enabled: true
    cache_duration: 24h
    cache_key: file_hash
  
  # Smart scoping - skip irrelevant agents
  smart_scoping:
    enabled: true
    skip_style_for_critical: true  # Skip style when critical bugs found
    skip_tests_for_docs: true      # Skip test review for doc changes
    auto_select_agents: true       # Let orchestrator choose
  
  # Parallel execution limits
  parallelism:
    max_concurrent_agents: 7
    max_concurrent_files: 10
  
  # ML-based filtering (Phase 3)
  ml_filtering:
    enabled: true
    model_path: .ml-model          # Path to trained model
    feedback_path: .feedback       # Path to feedback data
    min_confidence: 0.7            # Minimum confidence threshold (0-1)
    auto_train: true               # Auto-train when enough feedback
    train_threshold: 20            # Minimum feedback items for training
  
  # Distributed execution (Phase 4)
  distributed:
    enabled: false                 # Enable for large codebases (1000+ files)
    mode: local                    # local, cluster, cloud
    max_workers: 8                 # Number of worker threads/processes
    cloud_provider: null           # aws, gcp, azure (when mode=cloud)
    stream_results: true           # Stream results in real-time
  
  # Real-time streaming (Phase 4)
  streaming:
    enabled: true
    output_file: review-stream.jsonl
    format: jsonl                  # jsonl, json, markdown
    buffer_size: 10                # Findings to buffer before flush
  
  # Continuous learning (Phase 5)
  continuous_learning:
    enabled: true
    learning_rate: 0.1             # How fast to adapt (0-1)
    data_path: .learning-data      # Path to learning data
    min_samples: 50                # Minimum reviews before predictions
  
  # Confidence filtering
  filtering:
    minimum_confidence: 85%        # Only report high-confidence findings
    require_consensus: false       # Single agent can report
    human_review_threshold: 70%   # Flag low-confidence for human

# Quality Improvements
quality:
  # Multi-agent validation
  validation:
    critical_issues_require_2_agents: true
    cross_validate_security: true
  
  # Learning from feedback (Phase 3)
  learning:
    track_false_positives: true
    adjust_confidence_scores: true
    improve_patterns: true
    feedback_loop: interactive     # interactive, batch, or automated
    retrain_frequency: weekly      # How often to retrain model

shared_context:
  rules:
    - rules/security.md
    - rules/performance.md
    - rules/algorithms.md
    - rules/concurrency.md
    - rules/cross-file.md
    - rules/predictive.md
    - rules/bugs.md
    
  templates:
    - templates/database-types-template.ts
    - templates/migration-template.sql
    - templates/supabase-client-template.ts
    
  examples:
    - examples/mockdata-review-example.md

communication:
  type: shared-memory
  context_file: .review-context.json
  
error_handling:
  on_agent_failure: continue
  on_critical_failure: escalate
  max_retries: 2
  
output:
  format: markdown
  aggregation: review-planner
  location: ./review-report.md
