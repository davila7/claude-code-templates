<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .terminal-bg { fill: #1e1e1e; }
      .terminal-text { fill: #d4d4d4; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; }
      .terminal-green { fill: #4ec9b0; }
      .terminal-blue { fill: #569cd6; }
      .terminal-yellow { fill: #dcdcaa; }
      .terminal-purple { fill: #c586c0; }
      .terminal-orange { fill: #ce9178; }
      .terminal-red { fill: #f48771; }
      .terminal-gray { fill: #808080; }
      .terminal-white { fill: #ffffff; }
    </style>
  </defs>
  
  <!-- Terminal Background -->
  <rect class="terminal-bg" width="800" height="500" rx="8"/>
  
  <!-- Terminal Header -->
  <rect fill="#2d2d30" width="800" height="35" rx="8"/>
  <circle cx="20" cy="17.5" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17.5" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17.5" r="6" fill="#27c93f"/>
  <text class="terminal-text" x="400" y="23" text-anchor="middle">Terminal - npx cct --trending</text>
  
  <!-- Command Input -->
  <text class="terminal-text" x="20" y="65">
    <tspan class="terminal-green">$</tspan>
    <tspan class="terminal-white"> npx cct --trending</tspan>
  </text>
  
  <!-- Header -->
  <text class="terminal-yellow" x="20" y="100" font-weight="bold">📈 Trending Components (Last 7 days)</text>
  
  <!-- Trending Item 1 -->
  <rect fill="#2d2d30" x="15" y="120" width="770" height="60" rx="3"/>
  <text class="terminal-text" x="30" y="145">
    <tspan class="terminal-red" font-size="18">🔥</tspan>
    <tspan class="terminal-white" font-weight="bold"> 1. security-auditor</tspan>
  </text>
  <text class="terminal-text" x="50" y="165">
    <tspan class="terminal-green" font-weight="bold">↑ 156%</tspan>
    <tspan class="terminal-gray">  |  </tspan>
    <tspan class="terminal-orange">2,345 downloads</tspan>
    <tspan class="terminal-gray">  |  </tspan>
    <tspan class="terminal-blue">Category: security</tspan>
  </text>
  
  <!-- Trending Item 2 -->
  <rect fill="#2d2d30" x="15" y="190" width="770" height="60" rx="3"/>
  <text class="terminal-text" x="30" y="215">
    <tspan class="terminal-red" font-size="18">🔥</tspan>
    <tspan class="terminal-white" font-weight="bold"> 2. api-documentation-generator</tspan>
  </text>
  <text class="terminal-text" x="50" y="235">
    <tspan class="terminal-green" font-weight="bold">↑ 89%</tspan>
    <tspan class="terminal-gray">  |  </tspan>
    <tspan class="terminal-orange">1,678 downloads</tspan>
    <tspan class="terminal-gray">  |  </tspan>
    <tspan class="terminal-blue">Category: documentation</tspan>
  </text>
  
  <!-- Trending Item 3 -->
  <rect fill="#2d2d30" x="15" y="260" width="770" height="60" rx="3"/>
  <text class="terminal-text" x="30" y="285">
    <tspan class="terminal-red" font-size="18">🔥</tspan>
    <tspan class="terminal-white" font-weight="bold"> 3. database-optimizer</tspan>
  </text>
  <text class="terminal-text" x="50" y="305">
    <tspan class="terminal-green" font-weight="bold">↑ 67%</tspan>
    <tspan class="terminal-gray">  |  </tspan>
    <tspan class="terminal-orange">1,234 downloads</tspan>
    <tspan class="terminal-gray">  |  </tspan>
    <tspan class="terminal-blue">Category: optimization</tspan>
  </text>
  
  <!-- Trending Item 4 -->
  <rect fill="#2d2d30" x="15" y="330" width="770" height="60" rx="3"/>
  <text class="terminal-text" x="30" y="355">
    <tspan class="terminal-orange" font-size="18">🔥</tspan>
    <tspan class="terminal-white" font-weight="bold"> 4. react-performance-optimizer</tspan>
  </text>
  <text class="terminal-text" x="50" y="375">
    <tspan class="terminal-green" font-weight="bold">↑ 45%</tspan>
    <tspan class="terminal-gray">  |  </tspan>
    <tspan class="terminal-orange">1,123 downloads</tspan>
    <tspan class="terminal-gray">  |  </tspan>
    <tspan class="terminal-blue">Category: optimization</tspan>
  </text>
  
  <!-- Footer -->
  <text class="terminal-gray" x="20" y="425" font-style="italic">
    💡 Tip: Use --category to filter by type (agents, commands, mcps, skills)
  </text>
  
  <text class="terminal-text" x="20" y="455">
    <tspan class="terminal-green">$</tspan>
    <tspan class="terminal-gray"> npx cct --trending --category agents</tspan>
  </text>
</svg>
