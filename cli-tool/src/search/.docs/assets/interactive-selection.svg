<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650">
  <defs>
    <style>
      .terminal-bg { fill: #1e1e1e; }
      .terminal-text { fill: #d4d4d4; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; }
      .terminal-green { fill: #4ec9b0; }
      .terminal-blue { fill: #569cd6; }
      .terminal-yellow { fill: #dcdcaa; }
      .terminal-purple { fill: #c586c0; }
      .terminal-cyan { fill: #4fc1ff; }
      .terminal-gray { fill: #808080; }
      .terminal-white { fill: #ffffff; }
      .highlight { fill: #264f78; }
    </style>
  </defs>
  
  <!-- Terminal Background -->
  <rect class="terminal-bg" width="800" height="650" rx="8"/>
  
  <!-- Terminal Header -->
  <rect fill="#2d2d30" width="800" height="35" rx="8"/>
  <circle cx="20" cy="17.5" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17.5" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17.5" r="6" fill="#27c93f"/>
  <text class="terminal-text" x="400" y="23" text-anchor="middle">Terminal - Interactive Component Selection</text>
  
  <!-- Header -->
  <text class="terminal-yellow" x="20" y="65">📦 Interactive Installation</text>
  <text class="terminal-gray" x="20" y="85">Use ↑↓ to navigate, Space to select, → to expand group, a to toggle all</text>
  
  <!-- Agents Group (Expanded) -->
  <rect class="highlight" x="15" y="105" width="770" height="25" rx="3"/>
  <text class="terminal-text" x="20" y="123">
    <tspan class="terminal-cyan">▼</tspan>
    <tspan class="terminal-purple" font-weight="bold"> AGENTS </tspan>
    <tspan class="terminal-gray">(4 components)</tspan>
  </text>
  
  <!-- Agent Items -->
  <text class="terminal-text" x="40" y="153">
    <tspan class="terminal-green">☐</tspan>
    <tspan class="terminal-white"> Security Auditor</tspan>
    <tspan class="terminal-gray"> - Enterprise security toolkit</tspan>
  </text>
  
  <text class="terminal-text" x="40" y="178">
    <tspan class="terminal-green">☑</tspan>
    <tspan class="terminal-white"> Penetration Tester</tspan>
    <tspan class="terminal-gray"> - Advanced penetration testing</tspan>
  </text>
  
  <text class="terminal-text" x="40" y="203">
    <tspan class="terminal-green">☐</tspan>
    <tspan class="terminal-white"> Compliance Specialist</tspan>
    <tspan class="terminal-gray"> - Ensure compliance</tspan>
  </text>
  
  <text class="terminal-text" x="40" y="228">
    <tspan class="terminal-green">☑</tspan>
    <tspan class="terminal-white"> Incident Responder</tspan>
    <tspan class="terminal-gray"> - Handle security incidents</tspan>
  </text>
  
  <!-- Commands Group (Collapsed) -->
  <text class="terminal-text" x="20" y="263">
    <tspan class="terminal-cyan">▶</tspan>
    <tspan class="terminal-purple" font-weight="bold"> COMMANDS </tspan>
    <tspan class="terminal-gray">(4 components)</tspan>
  </text>
  
  <!-- MCPs Group (Collapsed) -->
  <text class="terminal-text" x="20" y="293">
    <tspan class="terminal-cyan">▶</tspan>
    <tspan class="terminal-purple" font-weight="bold"> MCPs </tspan>
    <tspan class="terminal-gray">(2 components)</tspan>
  </text>
  
  <!-- Skills Group (Collapsed) -->
  <text class="terminal-text" x="20" y="323">
    <tspan class="terminal-cyan">▶</tspan>
    <tspan class="terminal-purple" font-weight="bold"> SKILLS </tspan>
    <tspan class="terminal-gray">(1 component)</tspan>
  </text>
  
  <!-- Selection Summary -->
  <rect fill="#264f78" x="15" y="355" width="770" height="60" rx="3"/>
  <text class="terminal-text" x="30" y="380">
    <tspan class="terminal-yellow">📊 Selection Summary:</tspan>
  </text>
  <text class="terminal-text" x="30" y="400">
    <tspan class="terminal-white">2 components selected</tspan>
    <tspan class="terminal-gray"> (Penetration Tester, Incident Responder)</tspan>
  </text>
  
  <!-- Action Buttons -->
  <text class="terminal-text" x="20" y="445">
    <tspan class="terminal-green">[Enter]</tspan>
    <tspan class="terminal-white"> Install selected</tspan>
    <tspan class="terminal-gray">  |  </tspan>
    <tspan class="terminal-yellow">[Esc]</tspan>
    <tspan class="terminal-white"> Cancel</tspan>
    <tspan class="terminal-gray">  |  </tspan>
    <tspan class="terminal-blue">[a]</tspan>
    <tspan class="terminal-white"> Toggle all</tspan>
  </text>
  
  <!-- Installation Progress (after selection) -->
  <text class="terminal-gray" x="20" y="490" font-style="italic">After pressing Enter:</text>
  
  <text class="terminal-text" x="20" y="520">
    <tspan class="terminal-green">✓</tspan>
    <tspan class="terminal-white"> Installing Penetration Tester...</tspan>
  </text>
  <rect fill="#4ec9b0" x="40" y="530" width="300" height="8" rx="4"/>
  <rect fill="#2d2d30" x="340" y="530" width="200" height="8" rx="4"/>
  
  <text class="terminal-text" x="20" y="565">
    <tspan class="terminal-blue">⠋</tspan>
    <tspan class="terminal-white"> Installing Incident Responder...</tspan>
  </text>
  <rect fill="#569cd6" x="40" y="575" width="150" height="8" rx="4"/>
  <rect fill="#2d2d30" x="190" y="575" width="350" height="8" rx="4"/>
  
  <!-- Success Message -->
  <text class="terminal-green" x="20" y="615">✨ Successfully installed 2 components!</text>
</svg>
