version: 2

updates:

  # ╔══════════════════════════════════════════════════════════╗
  # ║  NPM — Core packages (Mon/Tue, staggered)              ║
  # ╚══════════════════════════════════════════════════════════╝

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels: ["dependencies", "root"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      root-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels: ["dependencies", "api"]
    commit-message:
      prefix: "chore(deps/api)"
    groups:
      api-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/cli-tool"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels: ["dependencies", "cli"]
    commit-message:
      prefix: "chore(deps/cli)"
    groups:
      cli-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "12:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels: ["dependencies", "dashboard"]
    commit-message:
      prefix: "chore(deps/dashboard)"
    groups:
      dashboard-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/cli-tool/analytics-ui"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "cli", "frontend"]
    commit-message:
      prefix: "chore(deps/analytics-ui)"
    groups:
      analytics-ui-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ╔══════════════════════════════════════════════════════════╗
  # ║  NPM — Cloudflare / Sandbox (Tue)                      ║
  # ╚══════════════════════════════════════════════════════════╝

