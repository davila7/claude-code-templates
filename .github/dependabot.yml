      day: "tuesday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "sandbox", "cloudflare"]
    commit-message:
      prefix: "chore(deps/sandbox-cf)"
    groups:
      sandbox-cf-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/cli-tool/components/sandbox/cloudflare"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "11:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "sandbox", "cloudflare"]
    commit-message:
      prefix: "chore(deps/components-cf)"
    groups:
      components-cf-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/cli-tool/components/sandbox/docker"
