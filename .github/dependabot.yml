        update-types: ["minor", "patch"]

  # ╔══════════════════════════════════════════════════════════╗
  # ║  NPM — Rust CLI npm wrapper (Thu)                      ║
  # ╚══════════════════════════════════════════════════════════╝

  - package-ecosystem: "npm"
    directory: "/cli-rust/npm/cct"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "rust-cli"]
    commit-message:
      prefix: "chore(deps/cli-rust-npm)"
    ignore:
      # Platform-specific optional deps are self-published — skip them
      - dependency-name: "@davila7/*"
    groups:
      cli-rust-npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # ╔══════════════════════════════════════════════════════════╗
  # ║  CARGO — Rust (Thu)                                    ║
  # ╚══════════════════════════════════════════════════════════╝

  - package-ecosystem: "cargo"
    directory: "/cli-rust"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: "chore(deps/cargo)"
    groups:
      cargo-minor-patch:
        patterns: ["*"]
