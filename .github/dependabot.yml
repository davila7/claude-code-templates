      interval: "weekly"
      day: "tuesday"
      time: "13:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "cloudflare"]
    commit-message:
      prefix: "chore(deps/cf-docs-monitor)"
    groups:
      cf-docs-monitor-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/cloudflare-workers/pulse"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "14:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: ["dependencies", "cloudflare"]
    commit-message:
      prefix: "chore(deps/cf-pulse)"
    groups:
